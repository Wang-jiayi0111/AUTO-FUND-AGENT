services:
  wewe-rss:
    image: cooderl/wewe-rss-sqlite:latest
    container_name: wewe-rss
    ports:
      - "4000:4000"
    environment:
      - DATABASE_TYPE=sqlite
      - TZ=Asia/Shanghai
      # 管理后台/API 授权码，请改成强密码
      - AUTH_CODE=wjy
      # 生成 RSS 完整 URL 时使用；本地开发用 localhost，上云改为域名或公网 IP
      - SERVER_ORIGIN_URL=http://localhost:4000
      # 推荐开启全文，便于 LLM 解析正文
      - FEED_MODE=fulltext
      # 工作日 14:25 和 14:33 刷新，让 14:30/14:35 的 poll 拿到最新 RSS
      - CRON_EXPRESSION=25,33 14 * * 1-5
      - MAX_REQUEST_PER_MINUTE=60
    volumes:
      - wewe-rss-data:/app/data
    restart: unless-stopped

volumes:
  wewe-rss-data:
